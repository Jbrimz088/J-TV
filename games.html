<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0b0f;
  --card:#1b1b24;
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920")
    center / cover no-repeat;
  color:#fff;
}

/* TOP BAR */
#top{
  position:fixed;
  top:0; left:0; right:0;
  height:56px;
  display:flex;
  align-items:center;
  padding:0 16px;
  background:rgba(0,0,0,.85);
  z-index:10;
}

#back{
  background:var(--panel);
  border:none;
  border-radius:10px;
  padding:8px 14px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#title{
  margin-left:16px;
  font-weight:700;
  letter-spacing:2px;
}

/* GRID */
#wrap{
  padding:80px 24px 24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  max-width:1200px;
  margin:0 auto;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  background:var(--panel);
  transform:scale(1.06);
  box-shadow:0 0 25px var(--glow);
}

.card img{
  width:100%;
  max-height:120px;
  object-fit:contain;
  margin-bottom:12px;
}

.card span{
  display:block;
  font-weight:700;
  letter-spacing:1px;
}
</style>
</head>
