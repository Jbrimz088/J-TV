<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Redirect Embed</title>

<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .video-wrapper {
    position: relative;
    width: 560px;
    height: 315px;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Click overlay */
  .click-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    background: rgba(0,0,0,0); /* invisible */
  }
</style>
</head>

<body>

<div class="video-wrapper">
  <iframe
    src="https://www.youtube.com/embed/St1DjbYbA88?start=3"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="click-overlay" onclick="openPie()"></div>
</div>

<script>
  function openPie() {
    window.location.href =
      "https://pie.yt/?v=https://youtu.be/St1DjbYbA88&t";
  }
</script>

</body>
</html>
