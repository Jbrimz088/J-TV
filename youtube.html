<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Link Converter Ad Free</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
}

.top {
  padding: 12px;
  background: #181818;
  border-bottom: 1px solid #222;
  display: flex;
  gap: 10px;
  align-items: center;
}

button {
  padding: 10px 14px;
  background: #7b2cff;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #9b5cff;
}

.back {
  background: #333;
}

.back:hover {
  background: #555;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #444;
}

.output {
  padding: 20px;
  text-align: center;
}

.output a {
  color: #6ecbff;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="top">
  <button class="back" onclick="goBack()">← Back</button>
  <button onclick="openYouTube()">Open YouTube</button>
  <input id="url" placeholder="Paste YouTube link here">
  <button onclick="convert()">Generate</button>
</div>

<div class="output" id="out"></div>

<script>
function goBack() {
  window.location.href = "main.html"; // 👈 set this
}

function openYouTube() {
  window.open("https://www.youtube.com", "_blank");
}

function parseYouTube(url) {
  try {
    const u = new URL(url);
    let id = "";
    let t = "";

    if (u.hostname.includes("youtu.be")) {
      id = u.pathname.slice(1);
      t = u.searchParams.get("t") || "";
    }

    if (u.hostname.includes("youtube.com")) {
      id = u.searchParams.get("v") || "";
      t = u.searchParams.get("t") || "";
    }

    if (!id) return null;
    return { id, t };
  } catch {
    return null;
  }
}

function convert() {
  const input = document.getElementById("url").value.trim();
  const data = parseYouTube(input);

  if (!data) {
    alert("Invalid YouTube link");
    return;
  }

  let pie = `https://pie.yt/?v=https://youtu.be/${data.id}`;
  if (data.t) pie += `&t=${data.t}`;

  document.getElementById("out").innerHTML =
    `Converted link:<br><a href="${pie}" target="_blank">${pie}</a>`;
}
</script>

</body>
</html>
