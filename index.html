<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --card: #1b1b24;
  --panel: #5b2bd6;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* HERO BACKGROUND */
#menu {
  min-height: 100vh;
  background: linear-gradient(
      rgba(0,0,0,.65),
      rgba(0,0,0,.65)
    ),
    url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1920")
    center / cover no-repeat;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* MENU GRID */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  padding: 40px;
  width: 100%;
  max-width: 1000px;
}

/* BUTTONS */
.menu-btn {
  height: 150px;
  background: var(--card);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, background .2s;
  user-select: none;
}

.menu-btn:hover {
  transform: scale(1.06);
  background: var(--panel);
  box-shadow: 0 0 28px var(--glow);
}

/* FOOTER */
footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menu-grid">

    <div class="menu-btn" onclick="location.href='Movie.html'">
      🎬 Movies
    </div>

    <div class="menu-btn" onclick="location.href='tv.html'">
      📺 TV Shows
    </div>

    <div class="menu-btn" onclick="location.href='guide.html'">
      📅 Guide
    </div>

    <div class="menu-btn" onclick="location.href='search.html'">
      🔍 Search
    </div>

  </div>
</div>

</body>
</html>
