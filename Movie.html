<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jmovies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* YOUR overlay bar */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px; /* adjust to fully cover Cineby header */
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      border-bottom: 1px solid #222;
    }

    #overlay span {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* iframe UNDER the overlay */
    iframe {
      position: absolute;
      top: 0; /* IMPORTANT: start at top so overlay covers their header */
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Your bar that covers Cineby -->
  <div id="overlay">
    <span>Jmovies</span>
  </div>

  <!-- Cineby (or any site that allows iframes) -->
  <iframe
    src="https://www.cineby.gd/browse/movie"
    allowfullscreen
    referrerpolicy="no-referrer"
  ></iframe>

</body>
</html>
