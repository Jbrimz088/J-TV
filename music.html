<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iframe Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* TOP BAR */
#topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:56px;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 12px;
  z-index:10;
}

#back{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#5b2bd6;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#title{
  font-weight:700;
  opacity:.9;
}

/* IFRAME */
#wrap{
  padding-top:56px;
  height:100vh;
}

iframe{
  width:100%;
  height:calc(100vh - 56px);
  border:none;
}
</style>
</head>

<body>

<div id="topbar">
  <button id="back" onclick="goBack()">← Back</button>
  <div id="title">Embedded Page</div>
</div>

<div id="wrap">
  <iframe
    src="https://music.devevil.com"
    allowfullscreen>
  </iframe>
</div>

<script>
function goBack(){
  location.href = "main.html"; // change this to your page
}
</script>

</body>
</html>
