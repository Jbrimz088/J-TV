<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* Background */
body {
    background-image: url("https://images.unsplash.com/photo-1601924579440-8b0d50fbe6f3");
    background-size: cover;
    background-position: center;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.75);
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Title */
h1 {
    font-size: 64px;
    margin-bottom: 40px;
}

/* Buttons container */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 320px;
}

/* Button style */
button {
    font-size: 20px;
    padding: 18px;
    background: #6c2cff;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
}

button:focus {
    outline: 3px solid white;
    transform: scale(1.05);
}

button:hover {
    background: #8a55ff;
}

/* APK button */
.apk {
    background: #00c853;
}

.apk:hover {
    background: #00e676;
}
</style>
</head>

<body>
<div class="overlay">

    <h1>J-TV</h1>

    <div class="buttons">
        <button onclick="location.href='movie.html'">Movies</button>
        <button onclick="location.href='tv.html'">TV Shows</button>
        <button onclick="location.href='guide.html'">Guide</button>

        <!-- 🔥 APK DOWNLOAD BUTTON -->
        <button class="apk"
            onclick="location.href='https://YOUR_APK_LINK_HERE.apk'">
            Download APK
        </button>
    </div>

</div>
</body>
</html>
