<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  overflow:hidden;
}

/* FORCE FOCUS */
html, body {
  outline:none;
}

/* TOP BAR */
#topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:56px;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  padding:0 12px;
  z-index:100;
}

#back{
  background:#5b2bd6;
  border:none;
  color:#fff;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
}

/* PLAYER */
iframe{
  margin-top:56px;
  width:100%;
  height:calc(100vh - 56px);
  border:none;
}

/* 🔴 TV CURSOR (ALWAYS VISIBLE) */
#tvCursor{
  position:fixed;
  width:26px;
  height:26px;
  border:3px solid #fff;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  z-index:99999;
  pointer-events:none;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body tabindex="0">

<div id="topbar">
  <button id="back" onclick="goBack()">← Back</button>
</div>

<iframe id="player" allowfullscreen allow="autoplay"></iframe>

<div id="tvCursor"></div>

<script>
/* FORCE FOCUS SO KEYS WORK */
document.body.focus();

/* LOAD VIDEO */
const p = new URLSearchParams(location.search);
const id = p.get("id");
const type = p.get("type");

let src="";
if(type==="movie"){
  src=`https://www.vidking.net/embed/movie/${id}?autoPlay=true`;
}else if(type==="tv"){
  const s=p.get("season")||1;
  const e=p.get("episode")||1;
  src=`https://www.vidking.net/embed/tv/${id}/${s}/${e}?autoPlay=true&nextEpisode=true&episodeSelector=true`;
}
document.getElementById("player").src=src;

/* BACK */
function goBack(){
  document.getElementById("player").src="";
  history.back();
}

/* CURSOR LOGIC */
const cursor=document.getElementById("tvCursor");
let x=window.innerWidth/2;
let y=window.innerHeight/2;
const speed=24;

function draw(){
  cursor.style.left=x+"px";
  cursor.style.top=y+"px";
}

/* MOVE ON ANY KEY */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") y-=speed;
  if(e.key==="ArrowDown") y+=speed;
  if(e.key==="ArrowLeft") x-=speed;
  if(e.key==="ArrowRight") x+=speed;
  x=Math.max(0,Math.min(window.innerWidth,x));
  y=Math.max(0,Math.min(window.innerHeight,y));
  draw();
});

/* MOVE ON TOUCH (FIRE TV REMOTES SOMETIMES SEND THIS) */
document.addEventListener("mousemove",e=>{
  x=e.clientX;
  y=e.clientY;
  draw();
});

/* INITIAL DRAW */
draw();
</script>

</body>
</html>
