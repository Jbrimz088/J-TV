<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1920")
    center / cover no-repeat;
  color:#fff;
}

#gate{
  background:rgba(0,0,0,.65);
  padding:32px;
  border-radius:16px;
  width:100%;
  max-width:360px;
  text-align:center;
}

h1{
  margin:0 0 20px;
  letter-spacing:4px;
  text-shadow:0 0 20px var(--glow);
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  outline:none;
}

button{
  margin-top:16px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:var(--panel);
  color:#fff;
}

#status{
  margin-top:14px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<div id="gate">
  <h1>J-TV</h1>
  <input id="codeInput" placeholder="Enter access code" />
  <button onclick="unlock()">Unlock</button>
  <div id="status"></div>
</div>

<script>
/*
IMPORTANT:
- NO auto redirect here
- NO kick/version check here
- This page NEVER redirects unless login succeeds
*/

const WORKER = "https://black-wildflower-8690.jcbrimley.workers.dev/";

async function unlock(){
  const code = document.getElementById("codeInput").value.trim();
  const status = document.getElementById("status");

  if(!code){
    status.textContent = "Enter a code";
    return;
  }

  status.textContent = "Checking…";

  try{
    const res = await fetch(WORKER,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ code })
    });

    const data = await res.json();

    if(data.ok){
      // ✅ SAVE SESSION
      localStorage.setItem("jtv_access","true");
      localStorage.setItem("jtv_version", data.version);

      // ✅ GO TO MAIN PAGE
      location.href = "main.html";
    }else{
      status.textContent = "Invalid code";
    }
  }catch{
    status.textContent = "Server error";
  }
}
</script>

</body>
</html>
