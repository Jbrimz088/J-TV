<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jmovies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Top image bar */
#topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  border-bottom: 1px solid #222;
}

/* Image/logo */
#topbar img {
  height: 28px;
}

/* Iframe below top bar */
#iframe {
  position: absolute;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100% - 64px);
  border: none;
}
</style>
</head>

<body>

<div id="topbar">
  <!-- CHANGE THIS IMAGE PATH -->
  <img src="https://imgur.com/a/Qr6so1B" alt="Jmovies">
</div>

<!-- CHANGE THIS URL -->
<iframe
  id="iframe"
  src="https://www.cineby.gd/browse/movie"
  allowfullscreen
  referrerpolicy="no-referrer"
></iframe>

</body>
</html>
