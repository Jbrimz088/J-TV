<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube → pie.yt Launcher</title>
<style>
  body {
    background: #0b0b0f;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  h1 {
    color: #b86bff;
  }
  textarea {
    width: 100%;
    height: 140px;
    background: #111;
    color: white;
    border: 1px solid #444;
    padding: 10px;
    resize: vertical;
  }
  button {
    margin-top: 10px;
    padding: 10px 18px;
    background: #7b2cff;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background: #9b5cff;
  }
  ul {
    margin-top: 20px;
    list-style: none;
    padding: 0;
  }
  li {
    margin-bottom: 10px;
  }
  a {
    color: #6ecbff;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<h1>YouTube → pie.yt</h1>

<p>Paste YouTube links (one per line):</p>

<textarea id="input">
https://www.youtube.com/watch?v=St1DjbYbA88&t=3s
https://youtu.be/dQw4w9WgXcQ
</textarea>

<br>
<button onclick="generate()">Generate Links</button>

<ul id="list"></ul>

<script>
function parseYouTube(url) {
  try {
    const u = new URL(url);

    let videoId = "";
    let time = "";

    // youtu.be short links
    if (u.hostname.includes("youtu.be")) {
      videoId = u.pathname.slice(1);
      time = u.searchParams.get("t") || "";
    }

    // youtube.com links
    if (u.hostname.includes("youtube.com")) {
      videoId = u.searchParams.get("v") || "";
      time = u.searchParams.get("t") || "";
    }

    if (!videoId) return null;

    let pie = `https://pie.yt/?v=https://youtu.be/${videoId}`;
    if (time) pie += `&t=${time}`;

    return pie;
  } catch {
    return null;
  }
}

function generate() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const lines = document.getElementById("input").value.split("\n");

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    const pieLink = parseYouTube(line);
    if (!pieLink) continue;

    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = pieLink;
    a.target = "_blank";
    a.textContent = pieLink;

    li.appendChild(a);
    list.appendChild(li);
  }
}
</script>

</body>
</html>
