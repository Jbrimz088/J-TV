<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --panel: #5b2bd6;
  --card: #1b1b24;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  background: #000;
  border-bottom: 1px solid #222;
}

/* MAIN MENU */
#menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

.menu-btn {
  width: 220px;
  height: 140px;
  background: var(--card);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.menu-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 0 25px var(--glow);
}

/* VIEWER */
#viewer {
  display: none;
  height: calc(100vh - 60px);
  flex-direction: column;
}

#topbar {
  background: var(--panel);
  padding: 10px;
  display: flex;
  align-items: center;
}

#backBtn {
  background: #000;
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

#title {
  margin-left: 12px;
  font-size: 18px;
  font-weight: 600;
}

iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 12px;
  font-size: 12px;
  color: #888;
  border-top: 1px solid #222;
}
</style>
</head>

<body>

<header>J-TV</header>

<!-- MAIN MENU -->
<div id="menu">
  <div class="menu-btn" onclick="openView('Movies', 'https://example.com')">
    🎬 Movies
  </div>

  <div class="menu-btn" onclick="openView('TV Shows', 'https://example.com')">
    📺 TV Shows
  </div>

  <div class="menu-btn" onclick="openView('Guide', 'https://example.com')">
    📅 Guide
  </div>
</div>

<!-- IFRAME VIEW -->
<div id="viewer">
  <div id="topbar">
    <button id="backBtn" onclick="goBack()">← Back</button>
    <div id="title"></div>
  </div>

  <iframe id="frame" src=""></iframe>
</div>

<footer>
  J-TV · Embedded content hub
</footer>

<script>
function openView(name, url) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("title").textContent = name;
  document.getElementById("frame").src = url;
}

function goBack() {
  document.getElementById("frame").src = "";
  document.getElementById("viewer").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}
</script>

</body>
</html>
