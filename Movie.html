<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies & TV • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --card: #1b1b24;
  --panel: #5b2bd6;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* GRID */
#grid {
  padding: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.card:hover {
  transform: scale(1.06);
  box-shadow: 0 0 18px var(--glow);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.card .title {
  padding: 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}

/* PLAYER */
#player {
  display: none;
  height: 100vh;
}

#player iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: #000;
}

/* BACK BUTTON */
#backBtn {
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--panel);
  border: none;
  color: #fff;
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  z-index: 10;
  display: none;
}

#backBtn:hover {
  box-shadow: 0 0 15px var(--glow);
}
</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">← Back</button>

<div id="grid"></div>

<div id="player">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
// ===============================
// TMDB CONFIG
// ===============================
const TMDB_KEY = "670f376983f73b67d757e9a951a3a5a9";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

// ===============================
// FETCH TRENDING (MOVIES + TV)
// ===============================
async function loadContent() {
  const endpoints = [
    `https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}`,
    `https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_KEY}`
  ];

  for (const url of endpoints) {
    const res = await fetch(url);
    const data = await res.json();
    data.results.forEach(item => addCard(item));
  }
}

function addCard(item) {
  if (!item.poster_path) return;

  const card = document.createElement("div");
  card.className = "card";

  const title = item.title || item.name;
  const type = item.media_type; // movie | tv

  card.innerHTML = `
    <img src="${IMG_BASE}${item.poster_path}">
    <div class="title">${title}</div>
  `;

  card.onclick = () => playItem(type, item.id);
  document.getElementById("grid").appendChild(card);
}

// ===============================
// PLAYER (VIDKING + OXYGEN)
// ===============================
function playItem(type, tmdbId) {
  document.getElementById("grid").style.display = "none";
  document.getElementById("player").style.display = "block";
  document.getElementById("backBtn").style.display = "block";

  const params = new URLSearchParams({
    autoPlay: "true",
    nextEpisode: "true",
    episodeSelector: "true",
    source: "oxygen"
  });

  const path =
    type === "tv"
      ? "tv"
      : "movie";

  document.getElementById("frame").src =
    `https://www.vidking.net/embed/${path}/${tmdbId}?${params.toString()}`;
}

function goBack() {
  document.getElementById("frame").src = "";
  document.getElementById("player").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("grid").style.display = "grid";
}

// ===============================
loadContent();
// ===============================
</script>

</body>
</html>
