<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1920")
    center / cover no-repeat;
  color:#fff;
}

#gate{
  background:rgba(0,0,0,.65);
  padding:32px;
  border-radius:16px;
  width:100%;
  max-width:380px;
  text-align:center;
}

h1{
  margin:0 0 20px;
  letter-spacing:4px;
  text-shadow:0 0 20px var(--glow);
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  outline:none;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:var(--panel);
  color:#fff;
}

#status{
  margin-top:14px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<div id="gate">
  <h1>J-TV</h1>

  <input id="userInput" placeholder="Username" autocomplete="username">
  <input id="passInput" placeholder="Password" type="password" autocomplete="current-password">

  <button onclick="login()">Login</button>
  <div id="status"></div>
</div>

<script>
/*
NO auto redirect
NO skip login
NO kick logic here
*/

const WORKER = "https://black-wildflower-8690.jcbrimley.workers.dev/";

/* -------- RESTORE SAVED CREDENTIALS (Fire TV safe) -------- */
function restoreSavedCredentials(){
  const userEl = document.getElementById("userInput");
  const passEl = document.getElementById("passInput");
  if(!userEl || !passEl) return;

  const savedUser = localStorage.getItem("jtv_saved_user");
  const savedPass = localStorage.getItem("jtv_saved_pass");

  if(savedUser) userEl.value = savedUser;
  if(savedPass) passEl.value = savedPass;
}

// initial load
window.addEventListener("DOMContentLoaded", restoreSavedCredentials);

// back navigation / WebView restore
window.addEventListener("pageshow", restoreSavedCredentials);

// app resume / visibility regain
document.addEventListener("visibilitychange", () => {
  if(!document.hidden){
    restoreSavedCredentials();
  }
});
/* --------------------------------------------------------- */

async function login(){
  const username = document.getElementById("userInput").value.trim();
  const password = document.getElementById("passInput").value.trim();
  const status = document.getElementById("status");

  if(!username || !password){
    status.textContent = "Enter username and password";
    return;
  }

  status.textContent = "Checking…";

  try{
    const res = await fetch(WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: username,
        password: password
      })
    });

    const data = await res.json();

    if(data.ok){
      // remember credentials on THIS device only
      localStorage.setItem("jtv_saved_user", username);
      localStorage.setItem("jtv_saved_pass", password);

      localStorage.setItem("jtv_access", "true");
      localStorage.setItem("jtv_version", data.version);
      localStorage.setItem("jtv_user", data.user || username);

      location.href = "main.html";
    } else {
      status.textContent = "Invalid username or password";
    }
  } catch (e){
    status.textContent = "Connection error";
  }
}
</script>

</body>
</html>
