<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.75)),
    url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1920")
    center / cover no-repeat;
  color:#fff;
}

#gate{
  background:rgba(0,0,0,.65);
  padding:32px;
  border-radius:16px;
  width:100%;
  max-width:380px;
  text-align:center;
}

h1{
  margin:0 0 20px;
  letter-spacing:4px;
  text-shadow:0 0 20px var(--glow);
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  outline:none;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:var(--panel);
  color:#fff;
}

#status{
  margin-top:14px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<div id="gate">
  <h1>J-TV</h1>

  <input id="userInput" placeholder="Username" />
  <input id="codeInput" placeholder="Password / Code" type="password" />

  <button onclick="unlock()">Login</button>
  <div id="status"></div>
</div>

<script>
/*
RULES:
- This page CAN redirect if already logged in
- This page NEVER kicks users out
- Kick/version logic is NOT here
*/

const WORKER = "https://black-wildflower-8690.jcbrimley.workers.dev/";

// ✅ SKIP LOGIN IF ALREADY AUTHED
if (localStorage.getItem("jtv_access") === "true") {
  location.href = "home.html";
}

async function unlock(){
  const user = document.getElementById("userInput").value.trim();
  const code = document.getElementById("codeInput").value.trim();
  const status = document.getElementById("status");

  if(!user || !code){
    status.textContent = "Enter username and password";
    return;
  }

  status.textContent = "Checking…";

  try{
    const res = await fetch(WORKER,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ code })
    });

    const data = await res.json();

    if(data.ok){
      // ✅ SAVE SESSION
      localStorage.setItem("jtv_access","true");
      localStorage.setItem("jtv_version", data.version);
      localStorage.setItem("jtv_user", user);

      location.href = "home.html";
    }else{
      status.textContent = "Invalid login";
    }
  }catch{
    status.textContent = "Server error";
  }
}
</script>

</body>
</html>
