<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --panel: #5b2bd6;
  --card: #1b1b24;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* HEADER */
header {
  padding: 16px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  background: #000;
  border-bottom: 1px solid #222;
}

/* MAIN PAGE */
#menu {
  min-height: calc(100vh - 60px);
  background-image: url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* OVERLAY */
#menu::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

.menu-content {
  position: relative;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

/* PLAY BUTTON */
.play-btn {
  width: 320px;
  height: 160px;
  background: linear-gradient(135deg, var(--panel), var(--glow));
  border-radius: 18px;
  font-size: 32px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 0 40px var(--glow);
  transition: transform .2s;
}

.play-btn:hover {
  transform: scale(1.05);
}

/* MENU BUTTONS */
.menu-btn {
  width: 200px;
  height: 120px;
  background: var(--card);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.menu-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 0 25px var(--glow);
}

/* VIEWER */
#viewer {
  display: none;
  height: calc(100vh - 60px);
  flex-direction: column;
}

#topbar {
  background: var(--panel);
  padding: 10px;
  display: flex;
  align-items: center;
}

#backBtn {
  background: #000;
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

#title {
  margin-left: 12px;
  font-size: 18px;
  font-weight: 600;
}

iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 12px;
  font-size: 12px;
  color: #888;
  border-top: 1px solid #222;
}
</style>
</head>

<body>

<header>J-TV</header>

<!-- MAIN MENU -->
<div id="menu">
  <div class="menu-content">

    <div class="play-btn" onclick="openView('Play', 'https://example.com')">
      ▶ PLAY
    </div>

    <div class="menu-btn" onclick="openView('Movies', 'https://example.com')">
      🎬 Movies
    </div>

    <div class="menu-btn" onclick="openView('TV Shows', 'https://example.com')">
      📺 TV Shows
    </div>

    <div class="menu-btn" onclick="openView('Guide', 'https://example.com')">
      📅 Guide
    </div>

    <div class="menu-btn" onclick="openView('Search', 'https://example.com')">
      🔍 Search
    </div>

  </div>
</div>

<!-- IFRAME VIEW -->
<div id="viewer">
  <div id="topbar">
    <button id="backBtn" onclick="goBack()">← Back</button>
    <div id="title"></div>
  </div>

  <iframe id="frame" src=""></iframe>
</div>

<footer>
  J-TV · Embedded content hub
</footer>

<script>
function openView(name, url) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("title").textContent = name;
  document.getElementById("frame").src = url;
}

function goBack() {
  document.getElementById("frame").src = "";
  document.getElementById("viewer").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}
</script>

</body>
</html>
