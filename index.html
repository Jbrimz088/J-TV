<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --panel: #5b2bd6;
  --card: #1b1b24;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  background: #000;
  border-bottom: 1px solid #222;
}

/* MAIN MENU */
#menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

.menu-btn {
  width: 220px;
  height: 140px;
  background: var(--card);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.menu-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 0 25px var(--glow);
}

/* SEARCH VIEW */
#searchView {
  display: none;
  height: calc(100vh - 60px);
  background:
    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4");
  background-size: cover;
  background-position: center;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

#searchView input {
  width: 280px;
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  outline: none;
}

#searchView button {
  background: var(--panel);
  border: none;
  color: #fff;
  padding: 12px 26px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

/* IFRAME VIEW */
#viewer {
  display: none;
  height: calc(100vh - 60px);
  flex-direction: column;
}

#topbar {
  background: var(--panel);
  padding: 10px;
  display: flex;
  align-items: center;
}

#backBtn {
  background: #000;
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

#title {
  margin-left: 12px;
  font-size: 18px;
  font-weight: 600;
}

iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 12px;
  font-size: 12px;
  color: #888;
  border-top: 1px solid #222;
}
</style>
</head>

<body>

<header>J-TV</header>

<!-- MAIN MENU -->
<div id="menu">
  <div class="menu-btn" onclick="openSearch('Movies')">🎬 Movies</div>
  <div class="menu-btn" onclick="openSearch('TV Shows')">📺 TV Shows</div>
  <div class="menu-btn" onclick="openView('Guide','https://example.com')">📅 Guide</div>
</div>

<!-- SEARCH -->
<div id="searchView">
  <input id="searchInput" placeholder="Search title..." />
  <button onclick="playSearch()">▶ Play</button>
</div>

<!-- PLAYER -->
<div id="viewer">
  <div id="topbar">
    <button id="backBtn" onclick="goBack()">← Back</button>
    <div id="title"></div>
  </div>
  <iframe id="frame"></iframe>
</div>

<footer>
  J-TV · Embedded hub
</footer>

<script>
let lastView = "menu";

function hideAll() {
  menu.style.display = "none";
  searchView.style.display = "none";
  viewer.style.display = "none";
}

function openSearch(type) {
  hideAll();
  lastView = "menu";
  searchView.style.display = "flex";
}

function playSearch() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return alert("Enter a title");

  // CHANGE THIS URL TO YOUR PLAYER / SEARCH HANDLER
  const url = "https://example.com/?q=" + encodeURIComponent(query);

  hideAll();
  viewer.style.display = "flex";
  title.textContent = "Playing: " + query;
  frame.src = url;
  lastView = "search";
}

function openView(name, url) {
  hideAll();
  viewer.style.display = "flex";
  title.textContent = name;
  frame.src = url;
  lastView = "menu";
}

function goBack() {
  frame.src = "";
  hideAll();

  if (lastView === "search") {
    searchView.style.display = "flex";
  } else {
    menu.style.display = "flex";
  }
}
</script>

</body>
</html>
