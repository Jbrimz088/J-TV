<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Player Picker</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
}

.notice {
  padding: 12px 16px;
  background: #181818;
  border-bottom: 1px solid #222;
  font-size: 14px;
}

.notice strong {
  color: #b86bff;
}

#player {
  margin: 20px auto;
  max-width: 900px;
}
</style>
</head>

<body>

<div class="notice">
  <strong>How to use:</strong>
  Find a video on YouTube (app or site), tap
  <strong>☰ / Share</strong>, copy the URL, then paste it into the converter.
</div>

<div id="player"></div>

<script>
/* Load YouTube IFrame API */
var tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

var player;

window.onYouTubeIframeAPIReady = function () {
  player = new YT.Player("player", {
    height: "390",
    width: "640",
    videoId: "JbFJWHWChJE", // starter video
    playerVars: {
      rel: 0,
      modestbranding: 1
    },
    events: {
      onReady: onPlayerReady
    }
  });
};

function onPlayerReady(event) {
  // Autoplay optional — remove if you don’t want it
  event.target.playVideo();
}
</script>

</body>
</html>
