<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --card: #1b1b24;
  --panel: #5b2bd6;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* GRID */
#grid {
  padding: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.card:hover {
  transform: scale(1.06);
  box-shadow: 0 0 18px var(--glow);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.card .title {
  padding: 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}

/* PLAYER */
#player {
  display: none;
  height: 100vh;
}

#player iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: #000;
}

/* BACK BUTTON (OVERLAY) */
#backBtn {
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--panel);
  border: none;
  color: #fff;
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  z-index: 10;
  display: none;
}

#backBtn:hover {
  box-shadow: 0 0 15px var(--glow);
}
</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">← Back</button>

<div id="grid"></div>

<div id="player">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
// ============================
// ADD MOVIES HERE (EASY MODE)
// ============================
const MOVIES = [
  {
    title: "Zootopia",
    tmdb: 269149,
    poster: "https://image.tmdb.org/t/p/w500/hlK0e0wAQ3VLuJcsfIYPvb4JVud.jpg"
  },
  {
    title: "Shrek",
    tmdb: 808,
    poster: "https://image.tmdb.org/t/p/w500/iB64vpL3dIObOtMZgX3RqdVdQDc.jpg"
  },
  {
    title: "The Avengers",
    tmdb: 24428,
    poster: "https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg"
  }
];

// ============================
// BUILD GRID
// ============================
const grid = document.getElementById("grid");

MOVIES.forEach(movie => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <img src="${movie.poster}" alt="${movie.title}">
    <div class="title">${movie.title}</div>
  `;
  card.onclick = () => playMovie(movie.tmdb);
  grid.appendChild(card);
});

// ============================
// PLAYER LOGIC
// ============================
function playMovie(tmdbId) {
  grid.style.display = "none";
  document.getElementById("player").style.display = "block";
  document.getElementById("backBtn").style.display = "block";
  document.getElementById("frame").src =
    "https://www.vidking.net/embed/movie/" + tmdbId;
}

function goBack() {
  document.getElementById("frame").src = "";
  document.getElementById("player").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  grid.style.display = "grid";
}
</script>

</body>
</html>
