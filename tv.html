<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TV Shows • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0b0f;
  --card:#1b1b24;
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* CONTROLS */
#controls{
  position:sticky;
  top:0;
  z-index:5;
  background:#000;
  padding:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

#controls button{
  background:var(--card);
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  white-space:nowrap;
}

#controls button.active{
  background:var(--panel);
}

#search{
  flex:1 1 160px;
  min-width:140px;
  background:#111;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:999px;
}

/* SEARCH MESSAGE */
#searchHint{
  background:#000;
  margin:10px;
  padding:14px 16px;
  border-radius:14px;
  box-shadow:0 0 20px var(--glow);
  font-size:14px;
  font-weight:600;
}

/* GRID */
#grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:active{
  transform:scale(.98);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card .title{
  padding:8px;
  font-size:14px;
  font-weight:600;
  text-align:center;
}
</style>
</head>

<body>

<div id="controls">
  <button id="homeBtn">Home</button>
  <button data-feed="trending" class="active">Trending</button>
  <button data-feed="popular">Popular</button>
  <button data-feed="top_rated">Top Rated</button>
  <input id="search" placeholder="Search TV shows…" />
</div>

<div id="searchHint">
  Not every show appears here — use <b>Search</b> to find any show.
</div>

<div id="grid"></div>

<script>
const TMDB_KEY = "670f376983f73b67d757e9a951a3a5a9";
const IMG = "https://image.tmdb.org/t/p/w500";

const grid = document.getElementById("grid");
const buttons = [...document.querySelectorAll("#controls button[data-feed]")];
const search = document.getElementById("search");
const searchHint = document.getElementById("searchHint");

let currentFeed = "trending";
let currentPage = 1;
let loading = false;
let searchMode = false;
let currentQuery = "";

document.getElementById("homeBtn").onclick = () => location.href = "main.html";

buttons.forEach(btn=>{
  btn.onclick = () => {
    searchMode = false;
    currentFeed = btn.dataset.feed;
    currentPage = 1;
    clearGrid();
    loadFeed();
  };
});

search.addEventListener("keydown", e=>{
  if(e.key === "Enter") doSearch();
});

function clearGrid(){
  grid.innerHTML = "";
}

function setActive(feed){
  buttons.forEach(b => b.classList.toggle("active", b.dataset.feed === feed));
}

async function loadFeed(){
  if(loading) return;
  loading = true;

  setActive(currentFeed);
  search.value = "";

  const url = currentFeed === "trending"
    ? `https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_KEY}&language=en-US&page=${currentPage}`
    : `https://api.themoviedb.org/3/tv/${currentFeed}?api_key=${TMDB_KEY}&language=en-US&page=${currentPage}`;

  const res = await fetch(url);
  const data = await res.json();

  if(data.results){
    data.results.forEach(addCard);
    currentPage++;
  }

  loading = false;
}

function addCard(show){
  if(!show.poster_path) return;

  const c = document.createElement("div");
  c.className = "card";
  c.innerHTML = `
    <img src="${IMG}${show.poster_path}">
    <div class="title">${show.name}</div>
  `;

  c.onclick = () => {
    location.href = `watch.html?id=${show.id}&type=tv&season=1&episode=1`;
  };

  grid.appendChild(c);
}

async function doSearch(){
  const q = search.value.trim();
  if(!q) return;

  searchMode = true;
  currentQuery = q;
  currentPage = 1;
  clearGrid();
  buttons.forEach(b => b.classList.remove("active"));

  await loadSearch();
}

async function loadSearch(){
  if(loading) return;
  loading = true;

  const res = await fetch(
    `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(currentQuery)}&language=en-US&page=${currentPage}`
  );
  const data = await res.json();

  if(data.results){
    data.results.forEach(addCard);
    currentPage++;
  }

  loading = false;
}

/* infinite scroll */
window.addEventListener("scroll", ()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 600){
    searchMode ? loadSearch() : loadFeed();
  }
});

loadFeed();
setTimeout(()=>searchHint.style.display="none",5000);
</script>

</body>
</html>
