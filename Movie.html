<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg:#0b0b0f;
  --card:#1b1b24;
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

/* TOP CONTROLS */
#controls{
  position:sticky;
  top:0;
  z-index:5;
  background:#000;
  padding:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

#controls button{
  background:var(--card);
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

#controls button.active,
#controls button:hover{
  background:var(--panel);
}

#search{
  margin-left:auto;
  background:#111;
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  width:200px;
}

/* GRID */
#grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.06);
  box-shadow:0 0 18px var(--glow);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card .title{
  padding:8px;
  font-size:14px;
  font-weight:600;
  text-align:center;
}

/* PLAYER */
#player{
  display:none;
  height:100vh;
}

#player iframe{
  width:100%;
  height:100%;
  border:none;
  background:#000;
}

/* BACK BUTTONS */
#backPlayer, #backHome{
  position:fixed;
  top:14px;
  padding:10px 14px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
  z-index:10;
  border:none;
  color:#fff;
}

#backPlayer{
  left:14px;
  background:var(--panel);
  display:none;
}

#backHome{
  right:14px;
  background:#333;
}
</style>
</head>

<body>

<button id="backPlayer" onclick="exitPlayer()">← Back</button>
<button id="backHome" onclick="location.href='index.html'">Home</button>

<div id="controls">
  <button onclick="loadFeed('trending')" class="active">Trending</button>
  <button onclick="loadFeed('popular')">Popular</button>
  <button onclick="loadFeed('top_rated')">Top Rated</button>
  <button onclick="loadFeed('now_playing')">Now Playing</button>
  <input id="search" placeholder="Search movies…" onkeydown="if(event.key==='Enter')doSearch()">
</div>

<div id="grid"></div>

<div id="player">
  <iframe
    id="frame"
    sandbox="allow-scripts allow-same-origin allow-forms"
    allow="autoplay; fullscreen">
  </iframe>
</div>

<script>
// ==========================
// CONFIG
// ==========================
const TMDB_KEY = "670f376983f73b67d757e9a951a3a5a9";
const IMG = "https://image.tmdb.org/t/p/w500";

const embedParams = new URLSearchParams({
  autoPlay:"true",
  source:"oxygen"
});

// ==========================
// HELPERS
// ==========================
function clearGrid(){ grid.innerHTML=""; }

function addCard(item){
  if(!item.poster_path) return;

  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <img src="${IMG}${item.poster_path}">
    <div class="title">${item.title}</div>
  `;
  card.onclick=()=>play(item.id);
  grid.appendChild(card);
}

// ==========================
// FEEDS (MOVIES ONLY)
// ==========================
async function loadFeed(feed){
  document.querySelectorAll("#controls button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  clearGrid();

  const url =
    feed==="trending"
      ? `https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}`
      : `https://api.themoviedb.org/3/movie/${feed}?api_key=${TMDB_KEY}`;

  const res=await fetch(url);
  const data=await res.json();
  data.results.forEach(addCard);
}

// ==========================
// SEARCH (MOVIES ONLY)
// ==========================
async function doSearch(){
  const q=search.value.trim();
  if(!q) return;
  clearGrid();

  const url=`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`;
  const res=await fetch(url);
  const data=await res.json();
  data.results.forEach(addCard);
}

// ==========================
// PLAYER (LOCKED)
// ==========================
function play(id){
  grid.style.display="none";
  controls.style.display="none";
  player.style.display="block";
  backPlayer.style.display="block";

  frame.src=`https://www.vidking.net/embed/movie/${id}?${embedParams.toString()}`;
}

function exitPlayer(){
  frame.src="";
  player.style.display="none";
  backPlayer.style.display="none";
  grid.style.display="grid";
  controls.style.display="flex";
}

// ==========================
const grid=document.getElementById("grid");
const controls=document.getElementById("controls");
const player=document.getElementById("player");
const frame=document.getElementById("frame");
const search=document.getElementById("search");
const backPlayer=document.getElementById("backPlayer");

// INITIAL LOAD
loadFeed("trending");
</script>

</body>
</html>
