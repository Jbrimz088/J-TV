<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movies • J-TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0b0b0f;
  --card: #1b1b24;
  --panel: #5b2bd6;
  --glow: #7c4dff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* HEADER */
header {
  background: #000;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

header button {
  background: var(--panel);
  border: none;
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

/* MOVIE GRID */
#grid {
  padding: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.card:hover {
  transform: scale(1.06);
  box-shadow: 0 0 18px var(--glow);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

.card div {
  padding: 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}

/* PLAYER VIEW */
#player {
  display: none;
  flex-direction: column;
  height: calc(100vh - 52px);
}

#player iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #000;
}
</style>
</head>

<body>

<header>
  <button onclick="goHome()">← Home</button>
  <h1>Movies</h1>
</header>

<!-- MOVIE GRID -->
<div id="grid">
  <div class="card" onclick="playMovie(1084242)">
    <img src="https://image.tmdb.org/t/p/w500/bjUWGw0Ao0qVWxagN3VCwBJHVo6.jpg">
    <div>Zootopia 2</div>
  </div>

  <div class="card" onclick="playMovie(269149)">
    <img src="https://image.tmdb.org/t/p/w500/hlK0e0wAQ3VLuJcsfIYPvb4JVud.jpg">
    <div>Zootopia</div>
  </div>

  <div class="card" onclick="playMovie(808)">
    <img src="https://image.tmdb.org/t/p/w500/iB64vpL3dIObOtMZgX3RqdVdQDc.jpg">
    <div>Shrek</div>
  </div>

  <div class="card" onclick="playMovie(24428)">
    <img src="https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg">
    <div>The Avengers</div>
  </div>
</div>

<!-- PLAYER -->
<div id="player">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
function playMovie(id) {
  document.getElementById("grid").style.display = "none";
  document.getElementById("player").style.display = "flex";
  document.getElementById("frame").src =
    "https://www.vidking.net/embed/movie/" + id;
}

function goHome() {
  document.getElementById("frame").src = "";
  document.getElementById("player").style.display = "none";
  document.getElementById("grid").style.display = "grid";
}
</script>

</body>
</html>
