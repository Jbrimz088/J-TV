<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV · Books</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0b0f;
  --card:#1b1b24;
  --panel:#5b2bd6;
  --glow:#7c4dff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:#fff;
  background:
    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)),
    url("https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1920")
    center / cover no-repeat;
}

/* TOP BAR */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:16px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
}

.header button{
  background:var(--card);
  border:none;
  color:#fff;
  font-size:18px;
  padding:10px 18px;
  border-radius:14px;
  cursor:pointer;
}

.header h2{
  margin:0;
  font-size:22px;
  letter-spacing:2px;
}

/* CONTENT */
.container{
  padding:120px 32px 40px;
  max-width:1400px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:24px;
}

.book{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.book:hover{
  background:var(--panel);
  transform:scale(1.06);
  box-shadow:0 0 28px var(--glow);
}

.book img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:14px;
}

.book h3{
  margin:0;
  font-size:18px;
}

.book span{
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button onclick="location.href='index.html'">⬅ Home</button>
  <h2>📚 Books</h2>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="grid">

    <!-- BOOK ITEM -->
    <div class="book" onclick="alert('Connect this to a reader or PDF later')">
      <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=600">
      <h3>Example Book</h3>
      <span>Author Name</span>
    </div>

    <div class="book" onclick="alert('Coming soon')">
      <img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?q=80&w=600">
      <h3>Another Title</h3>
      <span>Author Name</span>
    </div>

    <div class="book" onclick="alert('Coming soon')">
      <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=600">
      <h3>Coming Soon</h3>
      <span>J-TV Library</span>
    </div>

  </div>
</div>

</body>
</html>
