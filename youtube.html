<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Picker</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
}

.notice {
  padding: 12px 16px;
  background: #181818;
  border-bottom: 1px solid #222;
  font-size: 14px;
}

.notice strong {
  color: #b86bff;
}

iframe {
  width: 100%;
  height: calc(100% - 50px);
  border: none;
}
</style>
</head>

<body>

<div class="notice">
  <strong>How to use:</strong>
  Press the <strong>☰ (3 lines)</strong> → <strong>Share</strong> → copy the video URL,
  then paste it into the converter.
</div>

<iframe
  src="https://www.youtube.com"
  allow="autoplay; encrypted-media; picture-in-picture"
  allowfullscreen>
</iframe>

</body>
</html>
