<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --panel:#5b2bd6;
  --glow:#7c4dff;
  --bg:#0b0b0f;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:#000;
  color:#fff;
}

/* TOP BAR */
#topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:56px;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 12px;
  z-index:10;
}

#back{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:var(--panel);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#title{
  opacity:.9;
  font-weight:700;
  letter-spacing:1px;
}

/* SELECT SCREEN */
#selector{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:56px;
  background:
    linear-gradient(rgba(0,0,0,.8), rgba(0,0,0,.8)),
    url("https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=1920")
    center / cover no-repeat;
}

#box{
  background:rgba(0,0,0,.7);
  padding:28px;
  border-radius:18px;
  width:100%;
  max-width:420px;
  text-align:center;
}

h1{
  margin:0 0 18px;
  text-shadow:0 0 20px var(--glow);
}

select, button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:16px;
  margin-bottom:14px;
  outline:none;
}

select{ background:#111; color:#fff; }

#go{
  background:var(--panel);
  color:#fff;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

#msg{ font-size:14px; opacity:.85; }

/* PLAYER */
#playerWrap{
  display:none;
  padding-top:56px;
  height:100vh;
}

iframe{
  width:100%;
  height:calc(100vh - 56px);
  border:0;
}
</style>
</head>

<body>

<!-- TOP BAR (ALWAYS VISIBLE) -->
<div id="topbar">
  <button id="back" onclick="goBack()">← Back</button>
  <div id="title">Live TV</div>
</div>

<!-- SELECTOR -->
<div id="selector">
  <div id="box">
    <h1>Live TV</h1>

    <select id="country">
      <option value="">Select Supported Country</option>
      <option value="US">United States</option>
      <option value="CA">Canada</option>
    </select>

    <select id="language">
      <option value="">Select Supported Language</option>
      <option value="en">English</option>
    </select>

    <button id="go" onclick="loadLive()">Load Live</button>
    <div id="msg"></div>
  </div>
</div>

<!-- PLAYER -->
<div id="playerWrap">
  <iframe id="player" allowfullscreen></iframe>
</div>

<script>
/*
MAP: country + language -> iframe URL
Add/change sources here ONLY.
*/
const LIVE_SOURCES = {
  "US_en": "https://zhangboheng.github.io/Easy-Web-TV-M3u8/catalogues/langplay.html?tab=eng&title=English?tab=us&title=United%20States",
  "CA_en": "https://zhangboheng.github.io/Easy-Web-TV-M3u8/catalogues/langplay.html?tab=eng&title=English%20?tab=ca&title=Canada",
};

function loadLive(){
  const c = document.getElementById("country").value;
  const l = document.getElementById("language").value;
  const msg = document.getElementById("msg");
  const key = `${c}_${l}`;

  if(!c || !l){
    msg.textContent = "Please select country and language";
    return;
  }

  const src = LIVE_SOURCES[key];
  if(!src){
    msg.textContent = "Live TV not available for this selection";
    return;
  }

  // save preference
  localStorage.setItem("live_country", c);
  localStorage.setItem("live_language", l);

  // switch views
  document.getElementById("selector").style.display = "none";
  document.getElementById("playerWrap").style.display = "block";
  document.getElementById("player").src = src;
}

function goBack(){
  // stop playback
  document.getElementById("player").src = "";
  // show selector
  document.getElementById("playerWrap").style.display = "none";
  document.getElementById("selector").style.display = "flex";
}
</script>

</body>
</html>
