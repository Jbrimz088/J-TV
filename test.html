<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J-TV Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

/* IFRAME */
iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  z-index: 1;
}

/* OVERLAY UI */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.85),
    rgba(0,0,0,0)
  );
}

/* BUTTONS */
.btn {
  background: rgba(30,30,40,0.85);
  color: #fff;
  padding: 8px 14px;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: background .2s, transform .2s;
}

.btn:hover {
  background: #6d28d9;
  transform: scale(1.05);
}

/* BOTTOM PLAY BUTTON */
#playBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  background: #6d28d9;
  padding: 12px 18px;
  border-radius: 999px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(109,40,217,0.6);
}

#playBtn:hover {
  transform: scale(1.08);
}
</style>
</head>

<body>

<!-- OVERLAY UI -->
<div id="overlay">
  <div class="btn" onclick="goHome()">🏠 Home</div>
  <div class="btn" onclick="goMovies()">🎬 Movies</div>
  <div class="btn" onclick="goTV()">📺 TV</div>
  <div class="btn" onclick="goGuide()">📅 Guide</div>
  <div class="btn" onclick="goSearch()">🔍 Search</div>
</div>

<!-- PLAY BUTTON -->
<div id="playBtn" onclick="goPlay()">▶ Play</div>

<!-- IFRAME -->
<iframe id="frame" src="https://www.vidking.net"></iframe>

<script>
function goHome() {
  window.location.href = "index.html";
}

function goMovies() {
  document.getElementById("frame").src = "movie.html";
}

function goTV() {
  document.getElementById("frame").src = "tv.html";
}

function goGuide() {
  document.getElementById("frame").src = "guide.html";
}

function goSearch() {
  document.getElementById("frame").src = "search.html";
}

function goPlay() {
  document.getElementById("frame").src =
    "https://www.vidking.net/embed/movie/1084242?autoPlay=true&nextEpisode=true&episodeSelector=true";
}
</script>

</body>
</html>
